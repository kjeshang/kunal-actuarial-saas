<div class="mt-2 w-full overflow-x-auto rounded-xl border border-gray-300 shadow-sm bg-white">
    <div class="p-2 m-2">
        <div class="mb-2 flex flex-row items-center justify-between">
            <p class="text-xl">Amortization Schedule</p>
            <button mat-icon-button [matMenuTriggerFor]="aboveMenu">
                <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #aboveMenu="matMenu" yPosition="above">
                <button mat-menu-item (click)="triggerExportToCSV()">
                    <mat-icon>table_view</mat-icon>
                    <span>Export to CSV</span>
                </button>
                <button mat-menu-item (click)="triggerGeneratePDF()">
                    <mat-icon>article</mat-icon>
                    <span>Generate PDF</span>
                </button>
            </mat-menu>
        </div>
        <div [class]="showProgressBar ? 'block' : 'hidden'">
            <mat-progress-bar mode="indeterminate" />
        </div>
        <!-- @if(showProgressBar) {
            <mat-progress-bar mode="indeterminate" />
        } -->
        <div class="overflow-x-auto">
            <table mat-table class="mat-shadow-2 min-w-[600px] w-full text-sm text-left"
                [dataSource]="loanAmortizationSchedule">

                @for(item of loanTableConfiguration; track $index) {
                    <ng-container [matColumnDef]="item.name">
                        <th mat-header-cell [class]="item.textPosition" *matHeaderCellDef> 
                            {{ item.heading }}
                        </th>
                        <td mat-cell [class]="item.textPosition" *matCellDef="let element">
                            @if(item.name === "time" || item.name === "period") {
                                {{ element[item.name] }}
                            }
                            @else {
                                {{ showDisplayValue(element[item.name].displayValue) }}
                            }
                        </td>
                    </ng-container>
                }
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
    </div>
</div>
