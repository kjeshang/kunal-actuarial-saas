<app-feature-container>
    <div class="p-2 m-2 flex flex-col space-y-4">
        <section>
            <app-loan-parameters />
        </section>
        <section class="grid grid-cols-2 sm:grid-cols-6 gap-4">
            <app-loan-summary-card class="h-full" [metric]="loanStore.periodicPaymentAmount()" />
            <app-loan-summary-card class="h-full" [metric]="loanStore.totalInterestPaid()" />
            <app-loan-summary-card class="h-full" [metric]="loanStore.totalNumberOfPeriods()" />
            <app-loan-summary-card class="h-full" [metric]="loanStore.periodicEffectiveInterestRate()" />
            <app-loan-summary-card class="h-full" [metric]="loanStore.periodicNominalInterestRate()" />
            <app-loan-summary-card class="h-full" [metric]="loanStore.periodicRateOfDiscount()" />
        </section>
        <section>
            <mat-tab-group>
                <mat-tab label="Visualizations">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <app-line-chart class="mt-2" [chartData]="loanStore.amortizationCurveChart()" />
                        <app-stacked-area-chart class="mt-2" [chartData]="loanStore.interestVsPrincipalChart()" />
                        <app-pie-chart class="mt-2" [chartData]="loanStore.costOfBorrowingChart()" />
                        <app-multi-line-chart class="mt-2" [chartData]="loanStore.raceToEquityChart()" />
                    </div>
                </mat-tab>
                <mat-tab label="Table">
                    <ng-template matTabContent>
                        <app-loan-amortization-table />
                    </ng-template>
                </mat-tab>
            </mat-tab-group>
        </section>
    </div>
</app-feature-container>
